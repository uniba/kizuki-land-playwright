name: Keep-alive Heartbeat

on:
  schedule:
    - cron: '0 0 1 * *' # Runs at midnight on the 1st of every month
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Use the PAT to bypass Org restrictions
          token: ${{ secrets.MY_PERSONAL_TOKEN }} 

      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          # Use the PAT here as well to ensure the commit is "human"
          gh_token: ${{ secrets.MY_PERSONAL_TOKEN }}