name: Keep-alive Heartbeat

on:
  schedule:
    - cron: '0 0 1 * *' 
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}

      - name: Manual Custom Heartbeat
        run: |
          # Configure Git with your info
          git config --global user.name "GitHub Action Heartbeat"
          git config --global user.email "actions@github.com"
          
          # Create or update a dummy file to reset the 60-day timer
          echo "Last heartbeat: $(date)" > heartbeat.txt
          
          # Stage, commit, and push
          git add heartbeat.txt
          git commit -m "chore: automated heartbeat to keep actions alive [skip ci]"
          git push