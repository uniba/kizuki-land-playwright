name: Keep-alive Heartbeat (API Version)

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Update Repo Metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Updating repository metadata via API to reset dormancy timer..."
          
          # We get the current description
          DESC=$(gh api repos/$GH_REPO -q '.description')
          
          # We 'update' it to the same thing (or add a tiny timestamp)
          # This counts as a 'write' event to the repository metadata
          gh api -X PATCH repos/$GH_REPO -f description="$DESC "
          
          echo "Successfully 'poked' the repository via API."