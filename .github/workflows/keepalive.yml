name: Keep-alive Heartbeat

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Create and Delete Temp Branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # 1. Get the SHA of the latest commit on main
          SHA=$(gh api repos/$GH_REPO/git/ref/heads/main -q '.object.sha')
          
          echo "Creating temporary heartbeat branch..."
          # 2. Create a new branch called 'heartbeat-tmp'
          gh api -X POST repos/$GH_REPO/git/refs \
            -f ref='refs/heads/heartbeat-tmp' \
            -f sha="$SHA"
          
          echo "Branch created. Resetting timer..."
          sleep 5 
          
          echo "Deleting temporary heartbeat branch..."
          # 3. Delete the branch
          gh api -X DELETE repos/$GH_REPO/git/refs/heads/heartbeat-tmp
          
          echo "Dormancy timer reset successfully!"